<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <body>

    <h2>Event Reminder Tool</h2>
    <input type="date" id="dateInput">
    <button onclick="checkDate()">Check</button>
    <p id="output"></p>

    <script>
        function checkDate() {
            let inputDate = document.getElementById("dateInput").value;
            let result = inputDate ? processDate(inputDate) : "Please select a date!";
            document.getElementById("output").innerHTML = result;
            }
            function processDate(inputDate) {
            let date = new Date(inputDate);
            let year = date.getFullYear();
            let day = date.getDate();
            let months = ["January","February","March","April","May","June","July","August","September","October","November","December"];
            let monthName = months[date.getMonth()];

            let today = new Date();
            let yearsPassed = today.getFullYear() - year;

            yearsPassed -= (
                today.getMonth() < date.getMonth() ||
                (today.getMonth() === date.getMonth() && today.getDate() < date.getDate())
            ) ? 1 : 0;

            let message = yearsPassed >= 1
                ? "It has been more than a year since that date."
                : "It has been less than a year since that date.";

            return `Selected date: ${day} ${monthName}, ${year} <br>
                    Years passed: ${yearsPassed} <br>
                    ${message}`;
        }
    </script>
</body>
</html>
