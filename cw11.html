<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
    <script>
      class Book {
  constructor(title, author, price) {
    this.title = title;
    this.author = author;
    this.setPrice(price);
  }

  getTitle() {
    return this.title;
  }

  getAuthor() {
    return this.author;
  }

  setPrice(newPrice) {
    if (typeof newPrice === "number" && newPrice > 0) {
      this.price = newPrice;
    } else {
      console.log("Invalid price. Price must be a number greater than 0.");
    }
  }

  getDetails() {
    return `Title: ${this.title}, Author: ${this.author}, Price: ${this.price}`;
  }
}

const myBook = new Book("The Alchemist", "Paulo Coelho", 500);

myBook.setPrice(-100);  
myBook.setPrice("free"); 
myBook.setPrice(650);    
console.log(myBook.getDetails());

    </script>
</body>

</html>
