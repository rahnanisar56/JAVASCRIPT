<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        #feedbackDisplay {
            margin-top: 20px;
            color: black;
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
            color: green;
        }
    </style>
    </head>

    <body>
        <form id="feedbackForm">
            <input type="text" id="name" placeholder="Enter your name" required><br><br>

            <textarea id="feedback" placeholder="Enter your feedback" required></textarea><br><br>

            <button type="submit">Submit</button>
        </form>

        <div id="feedbackDisplay"></div>
        <div id="message"></div>

        <script>
            let form = document.getElementById("feedbackForm");
            let nameInput = document.getElementById("name");
            let feedbackInput = document.getElementById("feedback");
            let display = document.getElementById("feedbackDisplay");
            let message = document.getElementById("message");

            form.addEventListener("submit", function (event) {
                event.preventDefault();
                display.innerHTML = "<p><strong>Name:</strong> " + nameInput.value + "</p>" +
                    "<p><strong>Feedback:</strong> " + feedbackInput.value + "</p>";
                message.textContent = "Thanks for your feedback!";
                setTimeout(function () {
                    message.textContent = "";
                }, 5000);
                nameInput.value = "";
                feedbackInput.value = "";
            });
            display.addEventListener("mouseover", function () {
                display.style.color = "blue";
            });
            display.addEventListener("mouseout", function () {
                display.style.color = "black";
            });
        </script>
    </body>

</html>
