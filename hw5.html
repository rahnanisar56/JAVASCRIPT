<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <button onclick="checkAccess()">Check Access</button>
    <p id="result"></p>

    <script>
        function checkAccess() {
        let name = "Rahna";
        let age = 20;
        let isAdmin = true;

        let user = {
        name: name,
        age: age,
        isAdmin: isAdmin
        };
        let message = (user.age >= 18 && user.isAdmin) ? "Access Granted" : "Access Denied";
        document.getElementById("result").innerText = message;
        console.log("Age exists:", "age" in user);
        delete user.age;
        console.log("Updated user object:", user);
    }
    </script>
</body>
</html>
