<body>
    <script>
        let mysteryLevel = Math.floor(Math.random()*50) + 1;
        console.log(mysteryLevel);
        let userScore = "45";
        console.log(userScore);
        let scoreNumber = Number(userScore);
        console.log(scoreNumber);
        let diff = Math.abs(mysteryLevel - scoreNumber);
        console.log(diff);
        let sqrtValue = Math.sqrt(scoreNumber);
        console.log(sqrtValue);
        let piValue = Math.PI;
        console.log(piValue);
        let Result = "20" * 5;
        console.log(Result);
        let maxValue = Math.max(10, 20, mysteryLevel);
        console.log(maxValue);
        let minValue = Math.min(10, 20, mysteryLevel);
        console.log(minValue);
    </script>
</body>
