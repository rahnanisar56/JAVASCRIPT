<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

<script>
    let productNames = ["Apple", "Banana", "Orange"];
    let productPrices = [50, 30, 70];
    let products = [];

    for (let i = 0; i < productNames.length; i++) {
        let item = "Product: " + productNames[i] + " - Price: " + productPrices[i];
        products.push(item);
    }

    console.log("All Products:");
    for (let i = 0; i < products.length; i++) {
        console.log(products[i]);
    }

    console.log("Products with price greater than 50:");
        for (let i = 0; i < productPrices.length; i++) {
            if (productPrices[i] > 50) {
                console.log("Product: " + productNames[i] + " - Price: " + productPrices[i]);
            }
        }

    productNames.push("Watermelon");
    productPrices.push(80);
    console.log("Updated Product List:");
    for (let i = 0; i < productNames.length; i++) {
        console.log("Product: " + productNames[i] + " - Price: " + productPrices[i]);
    }
</script>
    
</body>
</html>
